<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Sala de Servidores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alarm-overlay" class="alarm-overlay-hidden">
        <div class="alarm-icon">⚠️</div>
        <h1>¡ALARMA DE INCENDIO!</h1>
        <p>Niveles críticos de humo detectados en la sala de servidores.</p>
        <button class="btn-stop-alarm" onclick="stopAlarm()">SILENCIAR ALARMA</button>
    </div>

    <div class="container">
        <h1>Monitoreo de Sala de Servidores</h1>
        
        <div class="card">
            <h3>Temperatura Ambiente</h3>
            <p class="value" id="temp-val">--.- °C</p>
        </div>

        <div class="card">
            <h3>Sensor de Humo (MQ-2)</h3>
            <p class="value" id="smoke-val">--</p>
            <p id="smoke-status">Estado: Normal</p>
            
            <div class="control-group" style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px;">
                <p id="cal-status" style="font-size: 0.95rem; font-weight: bold;">Inicializando sensor...</p>
                <label style="font-size: 0.9rem;">Umbral de Alerta Actual: <span id="umbral-val">--</span></label>
                
                <div class="umbral-config">
                    <input type="number" id="umbral-input" min="0" max="4095" placeholder="Ej: 850">
                    <button class="btn btn-on" onclick="sendUmbral()">Fijar Umbral</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Sistemas de Potencia e Iluminación</h3>
            <div class="relay-grid">
                <button id="btn-relay1" class="btn btn-off" onclick="toggleRelay1()">Fuente ATX: OFF</button>
                <button id="btn-relay2" class="btn btn-off" onclick="toggleRelay2()">Línea 12v Aux 1: OFF</button>
                <button id="btn-relay3" class="btn btn-off" onclick="toggleRelay3()">Línea 12v Aux 2: OFF</button>
                <button id="btn-led" class="btn btn-off" onclick="toggleLed()">LED Placa: OFF</button>
            </div>
        </div>

        <div class="card">
            <h3>Control de Extractores / Fanes</h3>
            
            <div class="control-group">
                <label>Modo de Funcionamiento:</label>
                <select id="mode-select" onchange="changeMode()">
                    <option value="auto">Automático (Por Temp)</option>
                    <option value="manual">Manual (UI Slider)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Velocidad del Ventilador: <span id="fan-speed-txt">0</span>%</label>
                <input type="range" id="fan-slider" min="0" max="100" value="0" oninput="updateSliderTxt(this.value)" onchange="sendFanSpeed(this.value)">
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
