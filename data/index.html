<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATR - Monitor Sala de Servidores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ATR - Control de Sala</h1>
        
        <p id="status" style="font-weight: bold; margin-bottom: 20px;">Iniciando...</p>

        <div id="temp-card" class="card">
            <h3>Temperatura Actual</h3>
            <div id="temp-value" class="value">--.- °C</div>
        </div>

        <div class="card">
            <h3>Controles</h3>
            
            <div class="control-group">
                <p>Extractor de Aire (Pin 26)</p>
                <button id="btn-extractor" class="btn">Alternar Extractor</button>
            </div>

            <div class="control-group" style="margin-top: 15px;">
                <p>Luz LED de Alerta (Pin 33)</p>
                <button id="btnLed" class="btn" style="background-color: #2ecc71;">Alternar LED</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
